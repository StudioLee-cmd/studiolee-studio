<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudioLee Studio</title>
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23D1FE17'/><text x='16' y='22' text-anchor='middle' font-size='18' font-family='sans-serif' font-weight='bold' fill='%230F1113'>SL</text></svg>">
</head>
<body>
  <nav id="main-nav"></nav>
  <div id="breadcrumb-bar"></div>
  <main id="app"></main>
  <div id="lightbox" class="lightbox hidden">
    <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
    <button class="lightbox-prev" onclick="lightboxNav(-1)">&#8249;</button>
    <button class="lightbox-next" onclick="lightboxNav(1)">&#8250;</button>
    <div class="lightbox-content"></div>
    <div class="lightbox-actions">
      <a id="lightbox-download" class="btn btn-accent" download>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        Download
      </a>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
